<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Λύσε τις πράξεις στο Πι και Φι!</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Selection Screen -->
    <div id="selection-screen" class="selection-screen">
        <div class="selection-content">
            <h1>Λύσε τις πράξεις στο Πι και Φι! 🚀</h1>
            <p>Επίλεξε πώς θέλετε να παίξετε:</p>
            <div class="selection-buttons">
                <button id="btn-single" class="action-btn choice-btn">
                    <span class="icon">📱</span>
                    <div class="btn-text-container">
                        <span>Κινητό/Τάμπλετ</span>
                        <small>(Ένα παιδί)</small>
                    </div>
                </button>
                <button id="btn-tablet" class="action-btn choice-btn">
                    <span class="icon">📱</span>
                    <div class="btn-text-container">
                        <span>Τάμπλετ</span>
                        <small>(Δύο παιδιά)</small>
                    </div>
                </button>
                <button id="btn-board" class="action-btn choice-btn">
                    <span class="icon">🖥️</span>
                    <div class="btn-text-container">
                        <span>Διαδραστικός Πίνακας</span>
                        <small>(Δύο παιδιά)</small>
                    </div>
                </button>
            </div>
        </div>
        <div class="characters selection-character">
            <div class="mascot pencil">
                <div class="pencil-eraser"></div>
                <div class="pencil-metal"></div>
                <div class="pencil-body">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="smile"></div>
                </div>
                <div class="pencil-wood"><div class="pencil-tip"></div></div>
            </div>
        </div>
    </div>

    <!-- Game Screen (Hidden initially) -->
    <div id="game-container" class="split-screen hidden">
        
        <!-- Player 1 -->
        <div class="player-board player-1">
            <header>
                <h2>Παίκτης 1</h2>
                <div class="score-board">Σκορ: <span id="score-p1">0</span></div>
            </header>
            
            <main class="game-area">
                <div class="equation-container">
                    <span id="num1-p1" class="number">?</span>
                    <span id="operator-p1" class="operator">+</span>
                    <span id="num2-p1" class="number">?</span>
                    <span class="equals">=</span>
                    <div class="answer-box" id="answer-p1"></div>
                </div>
                
                <div class="numpad">
                    <button class="num-btn" data-player="1">1</button>
                    <button class="num-btn" data-player="1">2</button>
                    <button class="num-btn" data-player="1">3</button>
                    <button class="num-btn" data-player="1">4</button>
                    <button class="num-btn" data-player="1">5</button>
                    <button class="num-btn" data-player="1">6</button>
                    <button class="num-btn" data-player="1">7</button>
                    <button class="num-btn" data-player="1">8</button>
                    <button class="num-btn" data-player="1">9</button>
                    <button class="cmd-btn clear" data-player="1">C</button>
                    <button class="num-btn" data-player="1">0</button>
                    <button class="cmd-btn check" data-player="1">✔</button>
                </div>
                <div id="feedback-p1" class="feedback"></div>
            </main>
            
            <div class="characters">
                <div class="mascot pencil">
                    <div class="pencil-eraser"></div>
                    <div class="pencil-metal"></div>
                    <div class="pencil-body">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="smile"></div>
                    </div>
                    <div class="pencil-wood"><div class="pencil-tip"></div></div>
                </div>
            </div>
        </div>

        <!-- Center Divider -->
        <div class="divider">
            <h1>Λύσε τις πράξεις στο Πι και Φι! 🚀</h1>
        </div>

        <!-- Player 2 (Bottom) -->
        <div class="player-board player-2">
            <header>
                <h2>Παίκτης 2</h2>
                <div class="score-board">Σκορ: <span id="score-p2">0</span></div>
            </header>
            
            <main class="game-area">
                <div class="equation-container">
                    <span id="num1-p2" class="number">?</span>
                    <span id="operator-p2" class="operator">+</span>
                    <span id="num2-p2" class="number">?</span>
                    <span class="equals">=</span>
                    <div class="answer-box" id="answer-p2"></div>
                </div>
                
                <div class="numpad">
                    <button class="num-btn" data-player="2">1</button>
                    <button class="num-btn" data-player="2">2</button>
                    <button class="num-btn" data-player="2">3</button>
                    <button class="num-btn" data-player="2">4</button>
                    <button class="num-btn" data-player="2">5</button>
                    <button class="num-btn" data-player="2">6</button>
                    <button class="num-btn" data-player="2">7</button>
                    <button class="num-btn" data-player="2">8</button>
                    <button class="num-btn" data-player="2">9</button>
                    <button class="cmd-btn clear" data-player="2">C</button>
                    <button class="num-btn" data-player="2">0</button>
                    <button class="cmd-btn check" data-player="2">✔</button>
                </div>
                <div id="feedback-p2" class="feedback"></div>
            </main>

            <div class="characters">
                <div class="mascot pencil">
                    <div class="pencil-eraser"></div>
                    <div class="pencil-metal"></div>
                    <div class="pencil-body">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="smile"></div>
                    </div>
                    <div class="pencil-wood"><div class="pencil-tip"></div></div>
                </div>
            </div>
        </div>

    </div>
    
    <button id="btn-back" class="cmd-btn back-btn hidden">↩️ Πίσω</button>

    <script src="script.js?v=3"></script>
</body>
</html>
